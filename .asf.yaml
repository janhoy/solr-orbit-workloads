# Apache Software Foundation repository configuration
# See https://github.com/apache/infrastructure-asfyaml/blob/main/README.md

github:
  # Repository metadata
  description: "Default workload specifications for the Apache Solr Orbit macrobenchmarking framework"
  homepage: https://solr.apache.org/
  labels:
    - apache
    - solr
    - benchmark
    - macrobenchmark
    - search
    - performance

  # Enable GitHub Issues; disable unused features
  features:
    issues: true
    wiki: false
    projects: false
    discussions: false

  # Allow squash merges only (keeps a linear, clean history)
  enabled_merge_buttons:
    squash: true
    merge: false
    rebase: false

  # Auto-delete head branch after a PR is merged
  pull_requests:
    del_branch_on_merge: true

  # Branch protection
  rulesets:
    - name: "Default Branch Protection"
      type: branch
      branches:
        includes:
          - "~DEFAULT_BRANCH"
          - "release/*"
          - "rel/*"
          - "9"
          - "10"
          - "11"
          - "12"
          - "13"
        excludes: []
      bypass_teams:
        - root
      restrict_deletion: true
      restrict_force_push: true

  autolink_jira:
    - SOLR

notifications:
  commits: commits@solr.apache.org
  issues: issues@solr.apache.org
  pullrequests: issues@solr.apache.org
